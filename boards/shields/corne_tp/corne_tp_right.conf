# Ensure UART interrupts are driven (fixes trackpoint being dead without USB logging)
CONFIG_UART_INTERRUPT_DRIVEN=y

# Constant-latency hotfix (nRF Desktop constlat.c port). ~2 mA active cost,
# buys deterministic ISR entry timing for the PS/2 bit-bang driver and BLE
# TIFS. Freed on ZMK IDLE via activity-state listener.
CONFIG_ZMK_CONSTLAT=y

# Pre-lock HFXO while active (nRF Desktop hfclk_lock.c port). Removes the
# ~360 µs crystal ramp from the first BLE conn event after wake. Paired with
# CONFIG_ZMK_BLE_DYNAMIC_HID_LATENCY to cut idle→active input latency.
CONFIG_ZMK_HFCLK_LOCK=y

# PS/2 Trackpoint Driver (badjeff, UART mode)
CONFIG_PS2=y
CONFIG_PS2_UART=y

# Fine-tune UART baud rate to match the TrackPoint's ~14,925 Hz clock.
# The default Baud14400 (0x003AF000) has 3.5% error vs the TP clock,
# causing framing errors. 0x003D2000 gives ~14,922 Hz (0.02% error).
CONFIG_PS2_UART_CUSTOM_BAUDRATE_REG=0x003D2000

# Wrap PS/2 bit-bang writes in an MPSL timeslot to prevent BLE radio
# ZLI interrupts from corrupting multi-byte commands and killing the TP.
# Async write mode (default) is used — each bit is set on the actual SCL
# falling edge, so no timing drift. The 8ms timeslot gives 2.5ms margin
# after the worst-case write (~5.4ms), so TIMER0 at 7.5ms never fires
# mid-write.
CONFIG_PS2_UART_TIMESLOT_PROTECTION=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1

# Error mitigation (recommended, self-contained packet validation)
CONFIG_ZMK_INPUT_MOUSE_PS2_ENABLE_ERROR_MITIGATION=y

# No HID report throttle — at 200Hz TP with 7.5ms CI, each connection
# event carries 1-2 reports. Pipeline=2 caps host-link throughput at
# ~266 PDU/s (2 × 133 events/s), giving 33% headroom over 200/s demand.
# With 2M PHY + MAX_CONN_EVENT_LEN=3000, each 2-PDU event (~1024µs)
# fits in the 3ms cap with room for 3 retransmits. No throttle needed.
CONFIG_ZMK_INPUT_MOUSE_PS2_REPORT_INTERVAL_MIN=0

# Allow VCC to be cut during sleep, saving power on trackpoint + peripherals
CONFIG_ZMK_EXT_POWER=y

# Idle power management: suspend UART after 5s of no trackpoint activity.
# Wake on trackpoint motion (GPIO falling-edge interrupt on the data pin)
# or any local keypress. Saves ~0.3-0.8 mA on the peripheral.
# Wake latency is ~40ms (PS/2 register re-apply), well below perception
# threshold. If 5s feels too aggressive, try 8000 or 10000.
CONFIG_PM_DEVICE=y
CONFIG_ZMK_INPUT_MOUSE_PS2_IDLE_PM=y
CONFIG_ZMK_INPUT_MOUSE_PS2_IDLE_PM_TIMEOUT_MS=5000

# Prevent the peripheral from sleeping while the central is connected.
# Without this, the peripheral's independent activity timer sleeps after
# 15 min of local inactivity — even if the user is still typing on the
# left half (no BLE data flows central→peripheral during normal typing).
# When the central itself sleeps, it disconnects BLE, which clears this
# flag and lets the peripheral sleep within seconds. Both halves stay
# awake together and sleep together.
CONFIG_ZMK_SLEEP_PREVENT_WHILE_BLE_CONNECTED=y
