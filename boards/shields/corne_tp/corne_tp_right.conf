# Ensure UART interrupts are driven (fixes trackpoint being dead without USB logging)
CONFIG_UART_INTERRUPT_DRIVEN=y

# Constant-latency hotfix (nRF Desktop constlat.c port). ~2 mA active cost,
# buys deterministic ISR entry timing for the PS/2 bit-bang driver and BLE
# TIFS. Freed on ZMK IDLE via activity-state listener.
CONFIG_ZMK_CONSTLAT=y

# Pre-lock HFXO while active (nRF Desktop hfclk_lock.c port). Removes the
# ~360 µs crystal ramp from the first BLE conn event after wake. Paired with
# CONFIG_ZMK_BLE_DYNAMIC_HID_LATENCY to cut idle→active input latency.
CONFIG_ZMK_HFCLK_LOCK=y

# PS/2 Trackpoint Driver (badjeff, UART mode)
CONFIG_PS2=y
CONFIG_PS2_UART=y

# Error mitigation (recommended, self-contained packet validation)
CONFIG_ZMK_INPUT_MOUSE_PS2_ENABLE_ERROR_MITIGATION=y

# Throttle HID reports to ~125Hz to reduce BLE overhead
CONFIG_ZMK_INPUT_MOUSE_PS2_REPORT_INTERVAL_MIN=8

# Allow VCC to be cut during sleep, saving power on trackpoint + peripherals
CONFIG_ZMK_EXT_POWER=y

# Idle power management: suspend UART after 30s of no trackpoint activity.
# Wake on trackpoint motion (GPIO falling-edge interrupt on the data pin)
# or any local keypress. Saves ~0.3-0.8 mA on the peripheral.
CONFIG_PM_DEVICE=y
CONFIG_ZMK_INPUT_MOUSE_PS2_IDLE_PM=y
