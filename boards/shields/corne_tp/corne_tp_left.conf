# Disable stock nice_view widget — replaced by our custom widget with peripheral battery
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# Constant-latency hotfix (nRF Desktop constlat.c port). ~2 mA active cost,
# buys deterministic ISR entry timing for BLE TIFS on the host link. Freed
# on ZMK IDLE via activity-state listener.
CONFIG_ZMK_CONSTLAT=y

# Pre-lock HFXO while active (nRF Desktop hfclk_lock.c port). Removes the
# ~360 µs crystal ramp from the first BLE conn event after wake. On the
# central this helps the host link; on the peripheral the split link.
CONFIG_ZMK_HFCLK_LOCK=y

# Pipelined HOG mouse notifies (nRF Desktop HIDS_SUBSCRIBER_PIPELINE_SIZE
# + RMK hid_provider/mouse.rs motion-event synchronization). Caps in-flight
# notifies at depth=2 and coalesces overflow into a single pending report
# (deltas INT16-saturated, buttons latched). Host-link only.
CONFIG_ZMK_HOG_MOUSE_PIPELINE=y

# Release HID state on HOG host BLE disconnect. When the link to the active
# Mac drops, clears pressed keyboard/consumer/mouse state and drains the
# HOG mouse pipeline coalesce buffer + in-flight counter. Reconnect no
# longer replays stuck modifiers, keys, or mouse buttons. Complements the
# split-side release in zmk_input_split_peripheral_disconnected (PR #2721
# cherry-pick) which covers peripheral->central pointing.
CONFIG_ZMK_HOG_RELEASE_ON_DISCONNECT=y

# BLE QoS channel map filter (nRF Desktop ble_qos.c port). Uses SDC
# per-connection-event CRC stats + chmap_filter library to dynamically
# blacklist interference-heavy BLE channels (WiFi coexistence).
# Central-only (bt_le_set_chan_map affects connections where we are central).
CONFIG_ZMK_BLE_QOS=y

# SDC controller TX buffers per connection. Default 3 is the bottleneck
# with 80Hz trackpoint + pipeline depth 2 + conn event extension.
# Bump to 5 so extended events can flush more PDUs per interval.
CONFIG_BT_CTLR_SDC_TX_PACKET_COUNT=5

# Central ACL event spacing. Default equals MAX_CONN_EVENT_LEN (7500µs),
# leaving zero scheduler slack between the two connections (host + split).
# 3750µs gives the SDC scheduler breathing room to avoid truncation.
CONFIG_BT_CTLR_SDC_CENTRAL_ACL_EVENT_SPACING_DEFAULT=3750

# Host dormant connection parameters (subrating module). After 15 min
# of idle, slows the Mac host link to CI=45ms/latency=30 — significant
# power savings. Clean wake on first keypress via subrating ACTIVE tier.
CONFIG_ZMK_BLE_HOST_CONN_PARAM_DORMANT=y

# Temporary: SDC info logging for lag investigation. Shows connection
# event scheduling, subrate negotiation, channel map changes.
CONFIG_SDC_LOG_LEVEL_INF=y

# Raise VCOM toggle thread priority (default 11 from nice_view) so it isn't
# starved by BLE/pointing/display threads. More consistent toggle timing
# makes the residual polarity flicker less perceptible.
CONFIG_LS0XX_VCOM_THREAD_PRIO=7

