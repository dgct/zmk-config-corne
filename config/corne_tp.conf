# Uncomment the following line to enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Don't sleep while host BLE is connected (sleep immediately on disconnect)
CONFIG_ZMK_SLEEP_PREVENT_WHILE_BLE_CONNECTED=y

# Uncomment the following line to increase the keyboard's wireless range
# +4 dBm is plenty for desk distance; +8 wastes ~3-10mA per radio event
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# Force 1M PHY — better range and penetration than 2M, essential when
# body/legs sit between the halves and attenuate the signal.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# USB logging is enabled via the `zmk-usb-logging` snippet in build.yaml
# (the snippet also provides the required `chosen { zephyr,console = ...; }`
# devicetree overlay, which CONFIG_ZMK_USB_LOGGING=y on its own does not).
# Remove the snippet from build.yaml to disable (saves significant battery).

# Pointing / Mouse support
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# USB boot protocol (for BIOS/BitLocker/FileVault)
CONFIG_ZMK_USB_BOOT=y

# Fetch peripheral battery level and expose to host + display
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Smoother trackpoint over split BLE (lower latency = less delay, more battery)
# Default 30 can cause ~225ms initial delay. 15 limits it to ~112ms.
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=15

# Dedicated display thread so LVGL rendering doesn't block input/BLE
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=30
