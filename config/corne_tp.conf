# Uncomment the following line to enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ZMK Studio — possible on stock ZMK but UART0 is used by PS/2 driver
# Test separately after trackpoint is working
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment the following line to enable USB Logging (this increases power usage by a significant amount, turn it off when not in use)
# CONFIG_ZMK_USB_LOGGING=y

# Ensure UART interrupts are driven (fixes trackpoint being dead without USB logging)
CONFIG_UART_INTERRUPT_DRIVEN=y

# Pointing / Mouse support
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# PS/2 Trackpoint Driver (badjeff, UART mode)
CONFIG_PS2=y
CONFIG_PS2_UART=y
