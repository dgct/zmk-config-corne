# Uncomment the following line to enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Uncomment the following line to increase the keyboard's wireless range
# +4 dBm is plenty for desk distance; +8 wastes ~3-10mA per radio event
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# Force 1M PHY — better range and penetration than 2M, essential when
# body/legs sit between the halves and attenuate the signal.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# USB logging is enabled via the `zmk-usb-logging` snippet in build.yaml
# (the snippet also provides the required `chosen { zephyr,console = ...; }`
# devicetree overlay, which CONFIG_ZMK_USB_LOGGING=y on its own does not).
# Remove the snippet from build.yaml to disable (saves significant battery).

# Pointing / Mouse support
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# USB boot protocol (for BIOS/BitLocker/FileVault)
CONFIG_ZMK_USB_BOOT=y

# Fetch peripheral battery level and expose to host + display
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Smoother trackpoint over split BLE (lower latency = less delay, more battery)
# Default 30 can cause ~225ms initial delay. 15 limits it to ~112ms.
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=15

# Blank display after idle timeout (stops LVGL rendering + SPI redraws)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Dedicated display thread so LVGL rendering doesn't block input/BLE
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=30

# === Stack overflow mitigations (zmkfirmware/zmk #3212, #3100, #3262) ===
# We are past commit 9e36ebd5 ("locality work nested behavior invocations"),
# which bloats system-workqueue stack usage. Combined with input-processor
# chains (pointing), the stock 1024B stacks overflow under load and crash.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048

# === Stack diagnostics — leave on until the crash is reproduced & confirmed ===
# Thread analyzer prints stack high-water marks every 30s to logs (when USB
# logging snippet is enabled). If a thread's HWM is close to its size, that's
# our culprit. Disable after validation to save ~2KB RAM.
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30

# Detect stack overflow at the canary level (catches the smash before it
# corrupts adjacent memory and produces a confusing crash signature)
CONFIG_HW_STACK_PROTECTION=y

# === Freeze diagnostics (added 2026-04-18 after sys_workq deadlock) ===
# See docs/freeze-2026-04-18-rca.md. Goal: when the next freeze hits,
# (a) names appear in Thread analyze instead of bare addresses, and
# (b) the freeze isn't buried under ~200k lines of <dbg> mouse spam.
#
# Quiet the dbg firehose — keep WRN/ERR/INF only. Per-module DBG can
# still be turned on selectively if needed.
CONFIG_LOG_DEFAULT_LEVEL=3

# Name threads so 0x20002618 etc. become "sysworkq" / "BT RX" / etc.
CONFIG_THREAD_NAME=y

# Surface assertion failures (silent deadlocks sometimes assert in the
# kernel scheduler before they wedge fully).
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# Full BLE-stack reasons (e.g. supervision-timeout disconnect 0x08 detail).
CONFIG_BT_LOG_LEVEL_DBG=y
