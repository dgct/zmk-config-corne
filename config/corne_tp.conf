# Uncomment the following line to enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# === Tier 0 battery savings: TX power down ================================
# Was +4 dBm. Dropped to -4 dBm (an 8 dB / ~6.3x reduction in TX power).
# At 2M PHY across the desk-distance split link, +4 dBm gave ~59 dB margin;
# -4 dBm leaves ~51 dB margin — still ample. Per-burst radio current drops
# from ~6.5 mA (+4 dBm) to ~3.1 mA (-4 dBm) per nRF52840 datasheet.
# Mac host link picks its own PHY (typically 1M) but our TX power is global.
# Bump back up if reception starts dropping at workspace range.
CONFIG_BT_CTLR_TX_PWR_MINUS_4=y

# === BLE link tuning ===
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN: enables ZMK's bundle of recommended
# experimental BLE settings. Note: as of this fork (Apr 2026) the ONLY
# direct effect is `BT_CTLR_PHY_2M default n` — i.e. it disables 2M PHY
# at the controller. We override that below for the split link (P6).
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# === P6: 2M PHY on the split link =========================================
# EXPERIMENTAL_CONN above forces 1M PHY for ALL links. At desk distance
# (30-50cm between halves) the 3dB sensitivity penalty of 2M is irrelevant
# (~59dB margin at +4dBm TX). 2M halves air-time per PDU (376µs → 196µs at
# 27B), letting more PDUs fit per conn-event and draining the ATT pool
# Re-enable 2M at the controller. ZMK split service already selects
# BT_USER_PHY_UPDATE + BT_AUTO_PHY_UPDATE, so the central auto-requests
# 2M PHY on the split link after connect; the peripheral half accepts.
# (Note: there is no separate `BT_AUTO_PHY_PERIPHERAL_2M` symbol in
# upstream Zephyr — that's NCS-only nomenclature. BT_AUTO_PHY_UPDATE
# alone is sufficient.)
#
# The Mac host link negotiates independently; Mac typically prefers 1M for
# range and will keep the host link at 1M. So this affects only the split
# half→half link in practice.
#
# Risk: if either half ends up far from the other (backpack/cross-room),
# revert by removing this line. ZMK_BLE_EXPERIMENTAL_CONN's `default n`
# will then take effect again.
CONFIG_BT_CTLR_PHY_2M=y

# === ATT buffer hardening (post sys_workq deadlock fix) ===
# Default ATT TX count (3) is the tightest bottleneck in the BLE stack.
# With 80Hz mouse reports, 7 buffers exhausted in ~87ms of RF congestion.
# 15 doubles headroom to ~187ms — paired with multi-in-flight (P5) the
# pool drains in parallel rather than 1-at-a-time. Cost: ~850B RAM
# (8 extra buffers × ~106B each: 34B data + 40B net_buf struct +
# 8B user_data + 24B meta). No BUILD_ASSERT couples this to ACL_TX_COUNT;
# ATT buffers can exceed ACL TX slots and queue internally.
CONFIG_BT_ATT_TX_COUNT=15

# === P9: FLUSH_MS=13 — coalesce one sample pair per flush ================
# At 80Hz trackpoint (12.5ms inter-sample period) FLUSH_MS=13 means the
# timer fires just AFTER the next sample arrives, packing exactly two
# REL_X/REL_Y samples into one packed-XY notify per flush. Result:
# ~80 notify/s → ~40 notify/s = 50% fewer ATT buffer allocations.
#
# Why not 40 (the Kconfig default): coalesces ~3 samples = 25Hz update,
# visible cursor chop. Why not 5 or 8: timer fires BEFORE the next sample
# (5 < 8 < 12.5ms), zero coalescing benefit, just adds latency for nothing.
# Why not 0: per-sample sends; full ATT pool pressure. 13 is the smallest
# value that guarantees coalescing at our sample rate.
#
# Cost: up to +13ms latency from first sample to wire. nRF Desktop targets
# ~15ms end-to-end for HID; we'd be ~20ms (13ms flush + 7.5ms conn-event).
# Below typical perception threshold for desktop (non-gaming) use.
#
# Move-then-click ordering preserved: non-REL events (buttons) trigger an
# immediate pre-flush in input_split.c — buttons never overtake motion.
CONFIG_ZMK_INPUT_SPLIT_FLUSH_MS=13

# === P5+P7: multi-in-flight notifies (capped at 2) ========================
# nRF Desktop pipeline pattern: pipeline depth 2 keeps the pipe full (one
# in controller, one being prepared) while halving ATT buffer pressure vs
# 4. Verified: completion callback fires asynchronously via
# att_tx_destroy_work on sysworkq, so the worker submits 2, hits the cap,
# yields, then sysworkq drains callbacks → real burst limiting.
#
# At 80Hz with 7.5ms conn interval, 2 in-flight = ~267 notify/s capacity
# vs 80/s demand (3.3× over-provisioned). Combined with FLUSH_MS=13 the
# effective demand drops to ~40/s — 6.7× headroom.
#
# 2/15 = 13% of ATT pool consumed by pointing at peak; 13 free for
# position/sensor/SMP. Set to 1 for legacy bisect.
CONFIG_ZMK_INPUT_SPLIT_MAX_IN_FLIGHT=2

# === P8: defer ATT 'sent' callback until controller TX-confirm =============
# Backported from NCS to dgct/zephyr (commit bd0d065b) and pulled in via
# the zmk west.yml bump to 6c1b9060.
#
# Without this, the bt_gatt_notify_cb completion fires when the host pushes
# the PDU to HCI (~µs after submit), NOT when the controller has actually
# transmitted it. Result: P5/P7's atomic_dec(in_flight) fires too early,
# the worker thinks pipeline space is available, and bursts can still
# exhaust the ATT pool faster than the radio drains it.
#
# With this enabled, the completion fires on Number-Of-Completed-Packets
# (i.e. ~7.5ms after submit at our conn interval). The in-flight counter
# now reflects actual controller occupancy → MAX_IN_FLIGHT=2 becomes
# real radio-paced backpressure, eliminating the freeze root cause.
#
# Side effects:
#   - Each TX PDU holds an extra net_buf ref for ~7.5ms longer. With
#     ATT_TX_COUNT=15 and MAX_IN_FLIGHT=2, worst case 2/15 buffers
#     held longer; 13 free. No exhaustion.
#   - Throughput at 80Hz with 7.5ms CI: 2 in-flight × 133 events/s =
#     ~267 PDU/s capacity. Demand 40/s (with FLUSH_MS=13). 6.7× margin.
#   - Refcount assertions in conn.c/l2cap.c are __ASSERT_NO_MSG (no-op
#     in release builds), but debug builds will catch any logic error.
#
# Bisect: comment out this line. The #if guards in att.c/l2cap.c/conn.c
# mean zero behavioral change vs upstream Zephyr when disabled.
CONFIG_BT_ATT_SENT_CB_AFTER_TX=y

# === P2: BT_GATT_NOTIFY_MULTIPLE auto-coalesce ===
# Even with P5 sending 4 in-flight, each notify still consumes 1 ATT pool
# buffer (~106B). Under RF stress 4 buffers held per conn event drains the
# 15-buffer pool in ~4 events (~30ms). With NOTIFY_MULTIPLE the host packs
# concurrent notifies (within FLUSH_MS=1ms) into a single ATT_NOTIFY_MULT
# PDU (opcode 0x23) using 1 ATT buffer. 4 coalesced → 1 buffer = 4× pool
# headroom (~120ms vs ~30ms).
#
# Mechanism: when central writes Client Supported Features bit 2 (handled
# in central.c), peripheral's gatt_cf_notify_multi() returns true and
# bt_gatt_notify_cb() auto-redirects through gatt_notify_mult(). Completion
# CB still fires `attr_count` times — our atomic_dec in input_notify_complete
# handles this correctly. If only 1 notify is buffered at flush time, Zephyr
# converts to regular NOTIFY (gatt_notify_mult_send single-handle optimization).
#
# Costs: ~1-2KB flash (GATT caching code + AES-CMAC for DB hash), ~200B RAM
# (gatt_cf_cfg array + nfy_mult buffer). +≤1ms latency per coalesce window
# (hidden in conn interval slack). FLUSH_MS=1 is the Zephyr default.
#
# Dependencies: BT_GATT_CACHING is required by NOTIFY_MULTIPLE; CACHING needs
# PSA_CRYPTO_CLIENT (already enabled for SMP). With BT_SETTINGS, the
# peripheral persists CSF per bonded peer — central re-writes on reconnect
# (idempotent, harmless if already set).
CONFIG_BT_GATT_CACHING=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE_FLUSH_MS=1

# === Separate TX completion workqueue ===
# By default, tx_complete_work (which frees ATT buffers) runs on sysworkq —
# the same queue where HOG drain runs. They serialize: HOG can't send until
# ATT buffers are freed, and buffers can't be freed until HOG finishes.
# This dedicates a thread to TX completion callbacks so ATT buffers are
# released promptly regardless of sysworkq load. Cost: ~1KB stack.
CONFIG_BT_CONN_TX_NOTIFY_WQ=y

# === Host ACL TX buffer count ===
# ATT buffers are allocated from the ACL TX pool. With BT_ATT_TX_COUNT=7,
# the default ACL_TX_COUNT=7 means ATT can starve the host of ACL slack
# for L2CAP signalling, SMP, and split-link traffic. Bump to 10 to give
# headroom. Cost: ~3 * (sizeof(struct net_buf) + ACL_TX_SIZE) ≈ 250B RAM.
CONFIG_BT_BUF_ACL_TX_COUNT=10

# === Host Event RX buffer count ===
# Zephyr static-asserts EVT_RX_COUNT > ACL_TX_COUNT (HCI Number-Of-Completed-
# Packets events must be drainable even when all ACL TX buffers are in flight).
# Default 8 is too low once ACL TX = 10. Cost: ~12 * sizeof(net_buf) ≈ 100B RAM.
CONFIG_BT_BUF_EVT_RX_COUNT=12

# === Controller RX buffer count ===
# Default is 1 — the LL has only one slot to receive a PDU before the host
# drains it. Under USB↔BLE coexistence with the radio at PRIO=0, host drain
# can lag, causing dropped PDUs and retransmits (which themselves cost ATT
# buffers). 4 absorbs typical scheduler hiccups. Cost: ~120B RAM.
CONFIG_BT_CTLR_RX_BUFFERS=4

# === Conn-param hardening for HID-mouse (RC-1 + RC-2, Apr 2026) =============
# Root cause of Bug 6 freezes: ATT TX pool exhaustion. The pool drains only
# when the host (Mac) ACKs at the LL — i.e. on a non-skipped conn event.
# ZMK defaults (peripheral_pref_latency=30, max_int=12) let Mac skip up to
# ~225ms of ACK windows, while 80Hz mouse fills 7 ATT buffers in ~87ms.
# The arithmetic guarantees periodic exhaustion under any RF stress.
#
# Override the central-side preferred params advertised to Mac:
#   latency=0   -> Mac must ACK every conn event (no skipping during HID)
#   min_int=6   -> 7.5ms (HID-recommended floor)
#   max_int=9   -> 11.25ms (HID-recommended ceiling; bounds drift)
#   timeout=400 -> 4s supervision (unchanged from ZMK default)
# Battery cost on central: small — the radio is already waking every ~10ms
# for the peripheral-side link, so removing slave latency on the Mac link
# adds ~one extra TX/RX pair per interval, not a new wake cadence.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# === Phase 1: dynamic HID latency manager (Tier 1 + Tier 2 battery savings) =
# Module: app/src/ble_latency.c (nRF Desktop ble_latency.c pattern, adapted
# for ZMK + macOS host). Three-tier state machine:
#
#   Active typing      -> latency = 0    (snappy HID, every conn event)
#   HID idle ≥5s       -> latency = 30   (~225ms wake at 7.5ms CI)
#   Deep idle (sleep)  -> CI 20ms, latency 200 (~4s wake), sup-timeout 9s
#                          (RMK's validated deep-idle profile)
#
# Tier transitions only mutate the `latency` field (and CI/timeout for deep
# idle); they preserve the conn-param hardening above as the active-typing
# baseline. First key after idle calls bt_conn_le_param_update() which
# snaps latency back to 0 before HID reports flow.
#
# Compatibility with the conn-param hardening above:
#   - PERIPHERAL_PREF_* are the params *advertised* to Mac at connect.
#   - bt_conn_le_param_update() overrides them per-conn at runtime.
#   - Mac may counter-propose; le_param_updated callback re-snapshots.
#
# Expected uplift: 30-60% over baseline once Mac honors the deep-idle
# profile. First-keystroke-after-deep-idle worst case ~40-60ms one-shot
# wake (one CI + param-update round-trip), then normal latency.
#
# Risk: re-exposes Bug 6 timing corners if anything regressed. Soak
# 24-48h. Disable with =n to revert; module compiles in either way.
CONFIG_ZMK_BLE_DYNAMIC_HID_LATENCY=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# USB logging: add `snippet: zmk-usb-logging` to build.yaml entries to enable.
# (The snippet provides the required chosen { zephyr,console = ...; } overlay.)

# Pointing / Mouse support
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# USB boot protocol (for BIOS/BitLocker/FileVault)
CONFIG_ZMK_USB_BOOT=y

# Fetch peripheral battery level and expose to host + display
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Suppress the synthetic level=0 battery event that ZMK fires on every
# peripheral disconnect (dgct/zmk@6038c5d6). Without this, the macOS
# menu bar flashes "battery dead -> real value" on every brief reconnect.
# The central re-reads the real value during BAS service re-discovery
# within ms, so no information is lost. Pairs with the peripheral-side
# proactive sample on connect (in dgct/zmk@6038c5d6: battery.c subscribes
# to split_peripheral_status_changed and forces a fresh ADC read on each
# central connect, eliminating the up-to-60s wait for the next periodic).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_NOTIFY_DISCONNECT=n

# Throttle proxy battery notifies (PR #2938-style hysteresis + min-interval).
# Suppresses the 1-2% drift notifies that ZMK fires every minute. Critical
# levels (<=15%) always pass through. Saves ~5-10 host wake-ups/hour and
# their ATT TX buffer cost. First notify per source is always sent.
CONFIG_ZMK_BATTERY_PROXY_NOTIFY_THROTTLE=y

# Smoother trackpoint over split BLE (lower latency = less delay, more battery)
# Default 30 can cause ~225ms initial delay. 15 limits it to ~112ms.
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=15

# Blank display after idle timeout (stops LVGL rendering + SPI redraws)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Dedicated display thread so LVGL rendering doesn't block input/BLE
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# LVGL task handler poll rate. Upstream default is 10ms (100Hz) but nice_view
# is bistable (no refresh needed) and our fastest animation frame is 100ms.
# 50ms keeps event-driven UI snappy while cutting active CPU wakeups ~40%.
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=50

# === Stack sizes (zmkfirmware/zmk #3212, #3100, #3262) ===
# Input-processor chains (pointing) + nested behavior invocations bloat
# the stock 1024B stacks. These are the minimum safe sizes.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
# (BT_RX_STACK_SIZE set further down to 2560 — see Bug 6 block)

# Hardware stack protection — zero-cost on nRF52 (MPU), catches real overflows
CONFIG_HW_STACK_PROTECTION=y

# === Bug 6 diagnostics: silent freeze at ~6min uptime ===
# (CONFIG_RESET_ON_FATAL_ERROR doesn't exist in this Zephyr; the
# task_wdt + HW fallback below recovers from fault-induced freezes
# as well as syswq stalls / IRQ-off livelocks.)

# Thread-level stack usage watermarks — lets a periodic heartbeat log
# how close each thread is to overflowing.  Very cheap (one word per
# thread, no runtime overhead until explicitly sampled).
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_MONITOR=y

# Increase BT RX workqueue stack.  The BT RX thread processes the full
# BLE host stack (HCI→L2CAP→ATT→GATT→subscription callback) and also
# calls k_work_flush() on the system workqueue's tx_complete_work.
# Default Zephyr is 1200; 2048 is already above that, but we give a
# bit more headroom.  Cost: +512 B RAM.
CONFIG_BT_RX_STACK_SIZE=2560

# === Bump central peripheral_event_msgq depth ===
# Default is 5 (in app/src/split/bluetooth/Kconfig).  This single queue
# carries ALL events from the peripheral half: key positions, sensors,
# AND coalesced mouse input.  At 80 Hz trackpoint, 5 slots fill in 62ms
# if the system workqueue stalls (e.g. display redraw, hog retry burst).
# Overflow is silently dropped (K_NO_WAIT).  Bumping to 32 buys ~400ms
# of headroom for ~620 B RAM.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=32

# === Hardware watchdog (Bug 6 — silent freeze recovery) ===
# RESET_ON_FATAL_ERROR only fires for software faults (MPU, UsageFault).
# A wedged system workqueue, BLE controller stall, or IRQ-off livelock
# produces NO fatal error — CPU runs but makes no progress, and we get
# the exact "silent freeze, no logs, both halves dead" symptom of Bug 6.
#
# nRF52 WDT runs on its own LF clock, independent of the CPU.  task_wdt
# layers per-thread channels on top: a delayable work item on syswq
# feeds task_wdt every 500ms; if the syswq stalls > 8s the HW WDT fallback
# fires and resets the chip.  The reset reason is then logged on next
# boot via HWINFO so we KNOW a freeze happened (vs. clean USB cycle).
# (P1 Apr 2026: feed=500ms, timeout=8000ms — was 1000/5000.  The 4s grace
#  window was tight; ~16-feed margin eliminates burst false-positives.)
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_HW_FALLBACK=y
CONFIG_TASK_WDT_MIN_TIMEOUT=8000
CONFIG_TASK_WDT_HW_FALLBACK_DELAY=1000

# Reset-reason reporting on boot (logs "RESET REASON: WATCHDOG ..." etc.)
CONFIG_HWINFO=y
CONFIG_REBOOT=y
